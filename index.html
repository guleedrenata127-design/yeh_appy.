rgba(13,32,69,0.9) 0%, rgba(18,42,94,0.9) 100%);\n      border: 1px solid rgba(212,160,23,0.2);\n      border-radius: 20px;\n      padding: 36px;\n      position: relative;\n      overflow: hidden;\n      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;\n    }\n    .benefit-card:hover {\n      transform: translateY(-8px);\n      box-shadow: 0 24px 60px rgba(0,0,0,0.4);\n      border-color: rgba(212,160,23,0.5);\n    }\n    .benefit-card::after {\n      content: '';\n      position: absolute;\n      top: 0; left: 0; right: 0;\n      height: 2px;\n      background: linear-gradient(90deg, var(--gold-dark), var(--gold-bright));\n      opacity: 0;\n      transition: opacity 0.3s;\n    }\n    .benefit-card:hover::after { opacity: 1; }\n\n    .benefit-icon {\n      width: 64px; height: 64px;\n      border-radius: 16px;\n      background: linear-gradient(135deg, rgba(212,160,23,0.2), rgba(212,160,23,0.08));\n      border: 1px solid rgba(212,160,23,0.3);\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 28px;\n      margin-bottom: 22px;\n    }\n    .benefit-title {\n      font-size: 20px;\n      font-weight: 800;\n      color: var(--white);\n      margin-bottom: 12px;\n      word-break: keep-all;\n    }\n    .benefit-desc {\n      font-size: 16px;\n      color: var(--text-light);\n      line-height: 1.75;\n      word-break: keep-all;\n    }\n    .benefit-tag {\n      display: inline-block;\n      margin-top: 16px;\n      background: rgba(212,160,23,0.15);\n      color: var(--gold-light);\n      font-size: 13px;\n      font-weight: 700;\n      padding: 4px 12px;\n      border-radius: 20px;\n      border: 1px solid rgba(212,160,23,0.3);\n    }\n\n    /* ======================== TRUST ======================== */\n    #trust {\n      background: linear-gradient(180deg, var(--navy-dark) 0%, var(--navy) 100%);\n    }\n    .trust-header { text-align: center; margin-bottom: 60px; }\n    .trust-header .section-desc { margin: 0 auto; }\n    .trust-header .divider { margin: 20px auto 40px; }\n\n    .trust-grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));\n      gap: 24px;\n    }\n    .trust-item {\n      text-align: center;\n      padding: 40px 28px;\n      background: rgba(255,255,255,0.03);\n      border: 1px solid rgba(255,255,255,0.08);\n      border-radius: 20px;\n      transition: transform 0.3s, background 0.3s;\n    }\n    .trust-item:hover {\n      transform: translateY(-6px);\n      background: rgba(212,160,23,0.06);\n      border-color: rgba(212,160,23,0.25);\n    }\n    .trust-icon {\n      font-size: 40px;\n      margin-bottom: 18px;\n    }\n    .trust-title {\n      font-size: 18px;\n      font-weight: 800;\n      color: var(--gold-bright);\n      margin-bottom: 10px;\n    }\n    .trust-desc {\n      font-size: 15px;\n      color: var(--text-light);\n      word-break: keep-all;\n      line-height: 1.75;\n    }\n\n    /* ======================== HOW TO ======================== */\n    #howto {\n      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-dark) 100%);\n    }\n    .howto-header { text-align: center; margin-bottom: 60px; }\n    .howto-header .section-desc { margin: 0 auto; }\n    .howto-header .divider { margin: 20px auto 40px; }\n\n    .steps {\n      display: flex;\n      gap: 0;\n      justify-content: center;\n      align-items: flex-start;\n      flex-wrap: wrap;\n    }\n    .step {\n      flex: 1;\n      min-width: 240px;\n      max-width: 320px;\n      text-align: center;\n      position: relative;\n      padding: 0 20px;\n    }\n    .step-connector {\n      position: absolute;\n      top: 44px;\n      right: -30px;\n      width: 60px;\n      height: 2px;\n      background: linear-gradient(90deg, var(--gold), rgba(212,160,23,0.2));\n    }\n    .step:last-child .step-connector { display: none; }\n\n    .step-num {\n      width: 88px; height: 88px;\n      border-radius: 50%;\n      background: linear-gradient(135deg, var(--gold-dark), var(--gold-bright));\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 32px;\n      font-weight: 900;\n      color: var(--navy-dark);\n      margin: 0 auto 24px;\n      box-shadow: 0 8px 32px rgba(212,160,23,0.35);\n      position: relative;\n      z-index: 1;\n    }\n    .step-title {\n      font-size: 19px;\n      font-weight: 800;\n      color: var(--white);\n      margin-bottom: 12px;\n      word-break: keep-all;\n    }\n    .step-desc {\n      font-size: 15px;\n      color: var(--text-light);\n      word-break: keep-all;\n      line-height: 1.75;\n    }\n\n    .step-cta-area {\n      text-align: center;\n      margin-top: 60px;\n    }\n\n    /* ======================== APPLY (FORM) ======================== */\n    #apply {\n      background: linear-gradient(180deg, var(--navy-dark) 0%, #08111f 100%);\n    }\n    .apply-inner {\n      max-width: 780px;\n      margin: 0 auto;\n      text-align: center;\n    }\n    .apply-inner .section-title { text-align: center; }\n    .apply-inner .section-desc { margin: 0 auto 20px; text-align: center; }\n    .apply-inner .divider { margin: 20px auto 40px; }\n\n    .form-card {\n      background: linear-gradient(135deg, rgba(13,32,69,0.95) 0%, rgba(18,42,94,0.95) 100%);\n      border: 1px solid rgba(212,160,23,0.3);\n      border-radius: 24px;\n      padding: 48px 40px;\n      position: relative;\n      overflow: hidden;\n    }\n    .form-card::before {\n      content: '';\n      position: absolute;\n      top: 0; left: 0; right: 0;\n      height: 3px;\n      background: linear-gradient(90deg, var(--gold-dark), var(--gold-bright), var(--gold-dark));\n    }\n\n    .notice-box {\n      background: rgba(212,160,23,0.1);\n      border: 1px solid rgba(212,160,23,0.3);\n      border-radius: 12px;\n      padding: 18px 24px;\n      margin-bottom: 32px;\n      font-size: 15px;\n      color: var(--gold-light);\n      display: flex;\n      align-items: center;\n      gap: 12px;\n      text-align: left;\n      word-break: keep-all;\n    }\n    .notice-box i { font-size: 20px; flex-shrink: 0; }\n\n    .form-buttons {\n      display: flex;\n      flex-direction: column;\n      gap: 16px;\n    }\n    .btn-apply-kakao {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 12px;\n      background: var(--kakao-yellow);\n      color: #3c1e1e;\n      font-size: 19px;\n      font-weight: 800;\n      padding: 22px;\n      border-radius: 14px;\n      text-decoration: none;\n      transition: transform 0.2s, box-shadow 0.2s;\n      box-shadow: 0 8px 30px rgba(254,229,0,0.3);\n      border: none;\n      cursor: pointer;\n    }\n    .btn-apply-kakao:hover {\n      transform: translateY(-3px);\n      box-shadow: 0 14px 40px rgba(254,229,0,0.5);\n    }\n\n    .btn-apply-form {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 12px;\n      background: linear-gradient(135deg, var(--gold-dark), var(--gold));\n      color: var(--navy-dark);\n      font-size: 18px;\n      font-weight: 800;\n      padding: 20px;\n      border-radius: 14px;\n      text-decoration: none;\n      transition: transform 0.2s, box-shadow 0.2s;\n      box-shadow: 0 8px 30px rgba(212,160,23,0.3);\n    }\n    .btn-apply-form:hover {\n      transform: translateY(-3px);\n      box-shadow: 0 14px 40px rgba(212,160,23,0.5);\n    }\n\n    .form-note {\n      font-size: 14px;\n      color: var(--text-muted);\n      margin-top: 20px;\n      word-break: keep-all;\n      line-height: 1.7;\n    }\n    .form-note a { color: var(--gold-light); text-decoration: none; }\n\n    /* ======================== FOOTER ======================== */\n    footer {\n      background: #060e1a;\n      border-top: 1px solid rgba(212,160,23,0.15);\n      padding: 56px 24px 36px;\n      text-align: center;\n    }\n    .footer-logo {\n      font-size: 26px;\n      font-weight: 900;\n      color: var(--gold-bright);\n      margin-bottom: 16px;\n    }\n    .footer-tagline {\n      font-size: 15px;\n      color: var(--text-muted);\n      margin-bottom: 28px;\n      word-break: keep-all;\n    }\n    .footer-links {\n      display: flex;\n      gap: 24px;\n      justify-content: center;\n      flex-wrap: wrap;\n      margin-bottom: 32px;\n    }\n    .footer-links a {\n      color: var(--text-muted);\n      text-decoration: none;\n      font-size: 14px;\n      transition: color 0.2s;\n    }\n    .footer-links a:hover { color: var(--gold-light); }\n    .footer-copy {\n      font-size: 13px;\n      color: rgba(136,146,176,0.5);\n      word-break: keep-all;\n      line-height: 1.8;\n    }\n    .footer-disclaimer {\n      font-size: 12px;\n      color: rgba(136,146,176,0.35);\n      margin-top: 12px;\n      word-break: keep-all;\n      line-height: 1.8;\n    }\n\n    /* ======================== FLOATING BTN ======================== */\n    .float-btn {\n      position: fixed;\n      bottom: 28px;\n      right: 28px;\n      z-index: 998;\n      background: var(--kakao-yellow);\n      color: #3c1e1e;\n      border: none;\n      border-radius: 50px;\n      padding: 14px 22px;\n      font-size: 15px;\n      font-weight: 800;\n      cursor: pointer;\n      box-shadow: 0 8px 28px rgba(0,0,0,0.35);\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      text-decoration: none;\n      transition: transform 0.2s, box-shadow 0.2s;\n      animation: fadeInRight 1s ease 1.5s both;\n    }\n    .float-btn:hover {\n      transform: translateY(-3px) scale(1.04);\n      box-shadow: 0 14px 36px rgba(254,229,0,0.45);\n    }\n    @keyframes fadeInRight {\n      from { opacity: 0; transform: translateX(40px); }\n      to   { opacity: 1; transform: translateX(0); }\n    }\n\n    /* ======================== ANIMATIONS ======================== */\n    @keyframes fadeInDown {\n      from { opacity: 0; transform: translateY(-20px); }\n      to   { opacity: 1; transform: translateY(0); }\n    }\n    @keyframes fadeInUp {\n      from { opacity: 0; transform: translateY(30px); }\n      to   { opacity: 1; transform: translateY(0); }\n    }\n\n    .reveal {\n      opacity: 0;\n      transform: translateY(30px);\n      transition: opacity 0.7s ease, transform 0.7s ease;\n    }\n    .reveal.visible {\n      opacity: 1;\n      transform: translateY(0);\n    }\n\n    /* ======================== RESPONSIVE ======================== */\n    @media (max-width: 768px) {\n      section { padding: 72px 20px; }\n\n      .about-grid {\n        grid-template-columns: 1fr;\n        gap: 40px;\n      }\n      .about-visual { order: -1; }\n\n      .step-connector { display: none; }\n      .steps { flex-direction: column; align-items: center; }\n      .step { padding: 0; margin-bottom: 40px; }\n\n      .form-card { padding: 32px 20px; }\n\n      nav { display: none; }\n\n      .ball { width: 44px; height: 44px; font-size: 15px; }\n      .hero-balls { gap: 10px; }\n\n      .float-btn { bottom: 20px; right: 20px; padding: 12px 18px; font-size: 14px; }\n    }\n\n    @media (max-width: 480px) {\n      .about-stat-row { gap: 14px; }\n      .about-stat { padding: 18px 14px; }\n      .combo-balls .mini-ball { width: 30px; height: 30px; font-size: 11px; }\n      .combo-row { gap: 6px; padding: 10px 12px; }\n    }\n  \u003C/style>\n\u003C/head>\n\u003Cbody>\n\n  \u003C!-- ===== HEADER ===== -->\n  \u003Cheader>\n    \u003Cdiv class=\"nav-inner\">\n      \u003Ca href=\"#\" class=\"logo\">포엠\u003Cspan>미디어\u003C/span>\u003C/a>\n      \u003Cnav>\n        \u003Ca href=\"#about\">서비스 소개\u003C/a>\n        \u003Ca href=\"#benefits\">무료 혜택\u003C/a>\n        \u003Ca href=\"#howto\">참여 방법\u003C/a>\n        \u003Ca href=\"#apply\" class=\"nav-cta\">💛 참여하기\u003C/a>\n      \u003C/nav>\n    \u003C/div>\n  \u003C/header>\n\n  \u003C!-- ===== HERO ===== -->\n  \u003Csection class=\"hero\" id=\"home\">\n    \u003Cdiv class=\"hero-content\">\n      \u003Cdiv class=\"hero-badge\">✨ 완전 무료 · 금전 요구 없음\u      \u003Cp class=\"form-note\">\n            📌 카카오톡 친구추가 후 채팅창에 \u003Cstrong style=\"color:var(--gold-light);\">[참여]\u003C/strong>라고 입력해 주시면 담당자가 안내드립니다.\u003Cbr />\n            📌 구글폼 작성 후에도 카카오톡으로 안내 메시지를 드립니다.\u003Cbr />\n            📌 개인정보는 데이터 수집 목적으로만 사용되며 외부에 절대 제공되지 않습니다.\n          \u003C/p>\n        \u003C/div>\n      \u003C/div>\n    \u003C/div>\n  \u003C/section>\n\n  \u003C!-- ===== FOOTER ===== -->\n  \u003Cfooter>\n    \u003Cdiv class=\"footer-logo\">포엠미디어\u003C/div>\n    \u003Cp class=\"footer-tagline\">데이터 분석으로 만드는 매주 프리미엄 10조합 · 완전 무료 서비스\u003C/p>\n    \u003Cdiv class=\"footer-links\">\n      \u003Ca href=\"#about\">서비스 소개\u003C/a>\n      \u003Ca href=\"#benefits\">무료 혜택\u003C/a>\n      \u003Ca href=\"#trust\">신뢰 포인트\u003C/a>\n      \u003Ca href=\"#howto\">참여 방법\u003C/a>\n      \u003Ca href=\"#apply\">신청하기\u003C/a>\n    \u003C/div>\n    \u003Cp class=\"footer-copy\">\n      © 2025 포엠미디어. All Rights Reserved.\n    \u003C/p>\n    \u003Cp class=\"footer-disclaimer\">\n      본 서비스는 순수 데이터 수집 목적으로 운영되며, 로또 당첨을 보장하지 않습니다.\u003Cbr />\n      어떠한 금전적 요구도 없으며, 참여는 자유 의지에 의해 이루어집니다.\n    \u003C/p>\n  \u003C/footer>\n\n  \u003C!-- ===== FLOATING BUTTON ===== -->\n  \u003Ca href=\"https://open.kakao.com/PLACEHOLDER\" target=\"_blank\" rel=\"noopener\" class=\"float-btn\">\n    \u003Ci class=\"fa-regular fa-comment-dots\">\u003C/i>\n    카카오 친구추가\n  \u003C/a>\n\n  \u003C!-- ===== SCRIPTS ===== -->\n  \u003Cscript>\n    // Intersection Observer for scroll reveal\n    const revealEls = document.querySelectorAll('.reveal');\n    const observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry, i) => {\n        if (entry.isIntersecting) {\n          setTimeout(() => {\n            entry.target.classList.add('visible');\n          }, i * 80);\n          observer.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.12 });\n    revealEls.forEach(el => observer.observe(el));\n\n    // Header scroll effect\n    const header = document.querySelector('header');\n    window.addEventListener('scroll', () => {\n      if (window.scrollY > 60) {\n        header.style.background = 'rgba(10,22,40,0.98)';\n        header.style.boxShadow = '0 4px 24px rgba(0,0,0,0.3)';\n      } else {\n        header.style.background = 'rgba(10,22,40,0.92)';\n        header.style.boxShadow = 'none';\n      }\n    });\n\n    // Smooth counter animation for stats\n    function animateCounter(el, target, suffix = '') {\n      let start = 0;\n      const duration = 1800;\n      const step = (timestamp) => {\n        if (!start) start = timestamp;\n        const progress = Math.min((timestamp - start) / duration, 1);\n        const ease = 1 - Math.pow(1 - progress, 3);\n        const current = Math.floor(ease * target);\n        el.textContent = current + suffix;\n        if (progress \u003C 1) requestAnimationFrame(step);\n      };\n      requestAnimationFrame(step);\n    }\n\n    // Observe stat numbers\n    const statObserver = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          const nums = entry.target.querySelectorAll('.about-stat .num');\n          nums.forEach(num => {\n            const text = num.textContent;\n            if (text === '10') animateCounter(num, 10, '');\n            else if (text === '0원') {\n              // static\n            } else if (text === '100%') {\n              animateCounter(num, 100, '%');\n            }\n          });\n          statObserver.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.5 });\n\n    const statsSection = document.querySelector('.about-stat-row');\n    if (statsSection) statObserver.observe(statsSection);\n\n    // Lotto ball hover sparkle effect\n    document.querySelectorAll('.ball').forEach(ball => {\n      ball.addEventListener('mouseenter', () => {\n        ball.style.transform = 'scale(1.2) rotate(-5deg)';\n        ball.style.transition = 'transform 0.2s cubic-bezier(0.34,1.56,0.64,1)';\n      });\n      ball.addEventListener('mouseleave', () => {\n        ball.style.transform = 'scale(1) rotate(0deg)';\n      });\n    });\n  \u003C/script>\n\u003C/body>\n\u003C/html>\n",{"created_at":143,"updated_at":143},1773814968907,{"file_path":145,"content":146,"is_binary":22,"metadata":147},"README.md","# 포엠미디어 홍보 웹사이트\n\n## 프로젝트 개요\n포엠미디어의 **프리미엄 로또 번호 무료 제공 서비스** 홍보 웹사이트입니다.  \n데이터 분석과 경험을 바탕으로 매주 프리미엄 10조합 번호를 무료로 제공하며,  \n순수 데이터 수집 목적으로 운영됩니다.\n\n---\n\n## 완성된 기능\n\n| 섹션 | 내용 |\n|------|------|\n| **히어로 섹션** | 임팩트 있는 메인 타이틀, 서브타이틀, CTA 버튼(카카오/구글폼), 로또 번호볼 시각화 |\n| **서비스 소개** | 포엠미디어 소개, 번호조합 카드 미리보기, 통계 수치(10조합·0원·100%) |\n| **무료 혜택 안내** | 프리미엄 10조합 번호, 기프티콘 증정, 데이터 인사이트, 무료·안전 보장 |\n| **신뢰 포인트** | 데이터 분석, 완전무료, 매주 정기 발행, 개인정보 보호, 신뢰 운영, 추가 혜택 |\n| **참여 방법** | 3단계(카카오 친구추가 → 참여 신청 → 매주 번호 수령) |\n| **신청 섹션** | 카카오톡 친구추가 버튼, 구글폼 신청 버튼, 안내 문구 |\n| **푸터** | 브랜드명, 태그라인, 내비게이션, 저작권, 면책 조항 |\n| **플로팅 버튼** | 우측 하단 고정 카카오 친구추가 버튼 |\n| **스크롤 애니메이션** | Intersection Observer 기반 요소 등장 효과 |\n| **헤더** | 스크롤 시 배경 강화, 상단 고정 네비게이션 |\n\n---\n\n## 진입점 URI\n\n| 경로 | 설명 |\n|------|------|\n| `/` 또는 `/index.html` | 메인 홍보 페이지 |\n| `#about` | 서비스 소개 섹션 |\n| `#benefits` | 무료 혜택 섹션 |\n| `#trust` | 신뢰 포인트 섹션 |\n| `#howto` | 참여 방법 섹션 |\n| `#apply` | 신청하기 섹션 |\n\n---\n\n## 플레이스홀더 교체 필요\n\n아래 URL을 실제 주소로 교체해 주세요:\n\n| 위치 | 현재 값 | 교체할 내용 |\n|------|---------|------------|\n| 히어로 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 채널 또는 오픈채팅 링크 |\n| 참여방법 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 링크 |\n| 신청 섹션 카카오 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 링크 |\n| 신청 섹션 구글폼 버튼 | `https://docs.google.com/forms/PLACEHOLDER` | 실제 구글폼 URL |\n| 플로팅 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 링크 |\n\n---\n\n## 디자인 특징\n\n- **색상**: 진한 네이비(#0a1628) + 골드(#d4a017, #ffd700) 프리미엄 조합\n- **폰트**: Noto Sans KR (Google Fonts CDN)\n- **아이콘**: Font Awesome 6.4.0 (jsDelivr CDN)\n- **반응형**: 모바일·태블릿·데스크탑 최적화\n- **애니메이션**: 스크롤 등장 효과, 번호볼 팝 효과, 배경 오브 부유 효과\n- **타겟 폰트 크기**: 최소 15px, 본문 17px (40~60대 가독성 최적화)\n\n---\n\n## 파일 구조\n\n```\nindex.html    ← 단일 HTML 파일 (CSS·JS 모두 포함)\nREADME.md     ← 프로젝트 문서\n```\n\n---\n\n## 미구현 사항 / 추천 다음 단계\n\n1. **실제 카카오톡 링크** 연결 (채널 또는 오픈채팅 URL)\n2. **실제 구글폼 URL** 연결\n3. **참여자 후기/리뷰 섹션** 추가\n4. **과거 번호 조합 아카이브** 섹션 추가\n5. **당첨 사례** 섹션 (데이터 수집 후 추가)\n6. **FAQ 섹션** 추가 (자주 묻는 질문)\n7. **구글 애널리틱스** 연동 (참여자 데이터 수집 강화)\n\n---\n\n## 배포 방법\n\n**Publish 탭**에서 원클릭 배포 가능합니다.  \n배포 후 제공되는 URL을 카카오톡 프로필 링크 또는 홍보 채널에 공유하세요.\n",{"created_at":148,"updated_at":148},1773815019530,[150,155,172,193,209,215,230,244,259,265,280,291],{"id":151,"role":29,"content":152,"action":17,"recommend_actions":17,"is_prompt":22,"render_template":17,"session_state":153,"system_reminder":17,"message_type":17,"tool_calls":17,"tool_call_id":17,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"reasoning_content":17,"cogen_id":17,"ctime":17},"9d656820-5f10-483b-9e26-9413794e33ce","포엠미디어 로또 번호 조합 서비스 홍보 웹사이트를 제작해주세요. 아래 내용을 반드시 포함해주세요.\n\n## 서비스 소개\n- 서비스명: 포엠미디어\n- 매주 데이터 분석과 경험을 바탕으로 프리미엄 로또 10조합 번호를 무료 제공\n- 금전적 요구 없음 - 순수 데이터 수집 목적\n- 무료 혜택: 프리미엄 10조합 번호, 각종 기프티콘 증정\n\n## 웹사이트 구성 (섹션)\n1. **히어로 섹션**: 임팩트 있는 메인 타이틀 + 서브타이틀 + CTA 버튼\n2. **서비스 소개**: 포엠미디어가 하는 일 설명\n3. **무료 혜택 안내**: 프리미엄 10조합 번호 + 기프티콘 혜택\n4. **신뢰 포인트**: 왜 포엠미디어를 선택해야 하는지 (데이터 분석, 무료, 신뢰성)\n5. **참여 방법**: 카카오톡 친구추가 → 참여 신청 → 매주 번호 수령 (3단계)\n6. **구글폼 참여 신청 섹션**: 구글폼 임베드 또는 버튼 (구글폼 URL은 플레이스홀더로)\n7. **푸터**: 포엠미디어 브랜드명, 안내문구\n\n## 디자인 요구사항\n- 타겟: 40~60대\n- 스타일: 믿음직스럽고 전문적인 느낌, 고급스러운 느낌\n- 색상: 진한 네이비 + 골드 조합 (신뢰감, 프리미엄 느낌)\n- 폰트: 가독성 높은 깔끔한 한글 폰트 (Noto Sans KR)\n- 반응형 디자인 (모바일 최적화)\n- 로또 번호볼 시각화 요소 포함\n- 애니메이션 효과로 고급스러움 표현\n\n## CTA 버튼\n- \"카카오톡 친구추가 후 [참여]하기\" 버튼 (노란색 카카오 스타일)\n- 구글폼 참여 신청 버튼\n\n## 중요\n- 실제 배포 가능한 완성도 높은 HTML 단일 파일로 제작\n- 한국어로 모든 텍스트 작성\n- 40~60대가 읽기 편한 폰트 크기 (최소 16px)\n",{"extension_prompt":154},"\u003Csource_project_type>super_agent\u003C/source_project_type>\n[user]: 데이터분석과 경험을 바탕으로 매주 프리미엄 10조합번호를 만들어내고있다 \ ;\\n    }\\n    .trust-item {\\n      text-align: center;\\n      padding: 40px 28px;\\n      background: rgba(255,255,255,0.03);\\n      border: 1px solid rgba(255,255,255,0.08);\\n      border-radius: 20px;\\n      transition: transform 0.3s, background 0.3s;\\n    }\\n    .trust-item:hover {\\n      transform: translateY(-6px);\\n      background: rgba(212,160,23,0.06);\\n      border-color: rgba(212,160,23,0.25);\\n    }\\n    .trust-icon {\\n      font-size: 40px;\\n      margin-bottom: 18px;\\n    }\\n    .trust-title {\\n      font-size: 18px;\\n      font-weight: 800;\\n      color: var(--gold-bright);\\n      margin-bottom: 10px;\\n    }\\n    .trust-desc {\\n      font-size: 15px;\\n      color: var(--text-light);\\n      word-break: keep-all;\\n      line-height: 1.75;\\n    }\\n\\n    /* ======================== HOW TO ======================== */\\n    #howto {\\n      background: linear-gradient(180deg, var(--navy) 0%, var(--navy-dark) 100%);\\n    }\\n    .howto-header { text-align: center; margin-bottom: 60px; }\\n    .howto-header .section-desc { margin: 0 auto; }\\n    .howto-header .divider { margin: 20px auto 40px; }\\n\\n    .steps {\\n      display: flex;\\n      gap: 0;\\n      justify-content: center;\\n      align-items: flex-start;\\n      flex-wrap: wrap;\\n    }\\n    .step {\\n      flex: 1;\\n      min-width: 240px;\\n      max-width: 320px;\\n      text-align: center;\\n      position: relative;\\n      padding: 0 20px;\\n    }\\n    .step-connector {\\n      position: absolute;\\n      top: 44px;\\n      right: -30px;\\n      width: 60px;\\n      height: 2px;\\n      background: linear-gradient(90deg, var(--gold), rgba(212,160,23,0.2));\\n    }\\n    .step:last-child .step-connector { display: none; }\\n\\n    .step-num {\\n      width: 88px; height: 88px;\\n      border-radius: 50%;\\n      background: linear-gradient(135deg, var(--gold-dark), var(--gold-bright));\\n      display: flex;\\n      align-items: center;\\n      justify-content: center;\\n      font-size: 32px;\\n      font-weight: 900;\\n      color: var(--navy-dark);\\n      margin: 0 auto 24px;\\n      box-shadow: 0 8px 32px rgba(212,160,23,0.35);\\n      position: relative;\\n      z-index: 1;\\n    }\\n    .step-title {\\n      font-size: 19px;\\n      font-weight: 800;\\n      color: var(--white);\\n      margin-bottom: 12px;\\n      word-break: keep-all;\\n    }\\n    .step-desc {\\n      font-size: 15px;\\n      color: var(--text-light);\\n      word-break: keep-all;\\n      line-height: 1.75;\\n    }\\n\\n    .step-cta-area {\\n      text-align: center;\\n      margin-top: 60px;\\n    }\\n\\n    /* ======================== APPLY (FORM) ======================== */\\n    #apply {\\n      background: linear-gradient(180deg, var(--navy-dark) 0%, #08111f 100%);\\n    }\\n    .apply-inner {\\n      max-width: 780px;\\n      margin: 0 auto;\\n      text-align: center;\\n    }\\n    .apply-inner .section-title { text-align: center; }\\n    .apply-inner .section-desc { margin: 0 auto 20px; text-align: center; }\\n    .apply-inner .divider { margin: 20px auto 40px; }\\n\\n    .form-card {\\n      background: linear-gradient(135deg, rgba(13,32,69,0.95) 0%, rgba(18,42,94,0.95) 100%);\\n      border: 1px solid rgba(212,160,23,0.3);\\n      border-radius: 24px;\\n      padding: 48px 40px;\\n      position: relative;\\n      overflow: hidden;\\n    }\\n    .form-card::before {\\n      content: '';\\n      position: absolute;\\n      top: 0; left: 0; right: 0;\\n      height: 3px;\\n      background: linear-gradient(90deg, var(--gold-dark), var(--gold-bright), var(--gold-dark));\\n    }\\n\\n    .notice-box {\\n      background: rgba(212,160,23,0.1);\\n      border: 1px solid rgba(212,160,23,0.3);\\n      border-radius: 12px;\\n      padding: 18px 24px;\\n      margin-bottom: 32px;\\n      font-size: 15px;\\n      color: var(--gold-light);\\n      display: flex;\\n      align-items: center;\\n      gap: 12px;\\n      text-align: left;\\n      word-break: keep-all;\\n    }\\n    .notice-box i { font-size: 20px; flex-shrink: 0; }\\n\\n    .form-buttons {\\n      display: flex;\\n      flex-direction: column;\\n      gap: 16px;\\n    }\\n    .btn-apply-kakao {\\n      display: flex;\\n      align-items: center;\\n      justify-content: center;\\n      gap: 12px;\\n      background: var(--kakao-yellow);\\n      color: #3c1e1e;\\n      font-size: 19px;\\n      font-weight: 800;\\n      padding: 22px;\\n      border-radius: 14px;\\n      text-decoration: none;\\n      transition: transform 0.2s, box-shadow 0.2s;\\n      box-shadow: 0 8px 30px rgba(254,229,0,0.3);\\n      border: none;\\n      cursor: pointer;\\n    }\\n    .btn-apply-kakao:hover {\\n      transform: translateY(-3px);\\n      box-shadow: 0 14px 40px rgba(254,229,0,0.5);\\n    }\\n\\n    .btn-apply-form {\\n      display: flex;\\n      align-items: center;\\n      justify-content: center;\\n      gap: 12px;\\n      background: linear-gradient(135deg, var(--gold-dark), var(--gold));\\n      color: var(--navy-dark);\\n      font-size: 18px;\\n      font-weight: 800;\\n      padding: 20px;\\n      border-radius: 14px;\\n      text-decoration: none;\\n      transition: transform 0.2s, box-shadow 0.2s;\\n      box-shadow: 0 8px 30px rgba(212,160,23,0.3);\\n    }\\n    .btn-apply-form:hover {\\n      transform: translateY(-3px);\\n      box-shadow: 0 14px 40px rgba(212,160,23,0.5);\\n    }\\n\\n    .form-note {\\n      font-size: 14px;\\n      color: var(--text-muted);\\n      margin-top: 20px;\\n      word-break: keep-all;\\n      line-height: 1.7;\\n    }\\n    .form-note a { color: var(--gold-light); text-decoration: none; }\\n\\n    /* ======================== FOOTER ======================== */\\n    footer {\\n      background: #060e1a;\\n      border-top: 1px solid rgba(212,160,23,0.15);\\n      padding: 56px 24px 36px;\\n      text-align: center;\\n    }\\n    .footer-logo {\\n      font-size: 26px;\\n      font-weight: 900;\\n      color: var(--gold-bright);\\n      margin-bottom: 16px;\\n    }\\n    .footer-tagline {\\n      font-size: 15px;\\n      color: var(--text-muted);\\n      margin-bottom: 28px;\\n      word-break: keep-all;\\n    }\\n    .footer-links {\\n      display: flex;\\n      gap: 24px;\\n      justify-content: center;\\n      flex-wrap: wrap;\\n      margin-bottom: 32px;\\n    }\\n    .footer-links a {\\n      color: var(--text-muted);\\n      text-decoration: none;\\n      font-size: 14px;\\n      transition: color 0.2s;\\n    }\\n    .footer-links a:hover { color: var(--gold-light); }\\n    .footer-copy {\\n      font-size: 13px;\\n      color: rgba(136,146,176,0.5);\\n      word-break: keep-all;\\n      line-height: 1.8;\\n    }\\n    .footer-disclaimer {\\n      font-size: 12px;\\n      color: rgba(136,146,176,0.35);\\n      margin-top: 12px;\\n      word-break: keep-all;\\n      line-height: 1.8;\\n    }\\n\\n    /* ======================== FLOATING BTN ======================== */\\n    .float-btn {\\n      position: fixed;\\n      bottom: 28px;\\n      right: 28px;\\n      z-index: 998;\\n      background: var(--kakao-yellow);\\n      color: #3c1e1e;\\n      border: none;\\n      border-radius: 50px;\\n      padding: 14px 22px;\\n      font-size: 15px;\\n      font-weight: 800;\\n      cursor: pointer;\\n      box-shadow: 0 8px 28px rgba(0,0,0,0.35);\\n      display: flex;\\n      align-items: center;\\n      gap: 8px;\\n      text-decoration: none;\\n      transition: transform 0.2s, box-shadow 0.2s;\\n      animation: fadeInRight 1s ease 1.5s both;\\n    }\\n    .float-btn:hover {\\n      transform: translateY(-3px) scale(1.04);\\n      box-shadow: 0 14px 36px rgba(254,229,0,0.45);\\n    }\\n    @keyframes fadeInRight {\\n      from { opacity: 0; transform: translateX(40px); }\\n      to   { opacity: 1; transform: translateX(0); }\\n    }\\n\\n    /* ======================== ANIMATIONS ======================== */\\n    @keyframes fadeInDown {\\n      from { opacity: 0; transform: translateY(-20px); }\\n      to   { opacity: 1; transform: translateY(0); }\\n    }\\n    @keyframes fadeInUp {\\n      from { opacity: 0; transform: translateY(30px); }\\n      to   { opacity: 1; transform: translateY(0); }\\n    }\\n\\n    .reveal {\\n      opacity: 0;\\n      transform: translateY(30px);\\n      transition: opacity 0.7s ease, transform 0.7s ease;\\n    }\\n    .reveal.visible {\\n      opacity: 1;\\n      transform: translateY(0);\\n    }\\n\\n    /* ======================== RESPONSIVE ======================== */\\n    @media (max-width: 768px) {\\n      section { padding: 72px 20px; }\\n\\n      .about-grid {\\n        grid-template-columns: 1fr;\\n        gap: 40px;\\n      }\\n      .about-visual { order: -1; }\\n\\n      .step-connector { display: none; }\\n      .steps { flex-direction: column; align-items: center; }\\n      .step { padding: 0; margin-bottom: 40px; }\\n\\n      .form-card { padding: 32px 20px; }\\n\\n      nav { display: none; }\\n\\n      .ball { width: 44px; height: 44px; font-size: 15px; }\\n      .hero-balls { gap: 10px; }\\n\\n      .float-btn { bottom: 20px; right: 20px; padding: 12px 18px; font-size: 14px; }\\n    }\\n\\n    @media (max-width: 480px) {\\n      .about-stat-row { gap: 14px; }\\n      .about-stat { padding: 18px 14px; }\\n      .combo-balls .mini-ball { width: 30px; height: 30px; font-size: 11px; }\\n      .combo-row { gap: 6px; padding: 10px 12px; }\\n    }\\n  \u003C/style>\\n\u003C/head>\\n\u003Cbody>\\n\\n  \u003C!-- ===== HEADER ===== -->\\n  \u003Cheader>\\n    \u003Cdiv class=\\\"nav-inner\\\">\\n      \u003Ca href=\\\"#\\\" class=\\\"logo\\\">포엠\u003Cspan>미디어\u003C/span>\u003C/a>\\n      \u003Cnav>\\n        \u003Ca href=\\\"#about\\\">서비스 소개\u003C/a>\\n        \u003Ca href=\\\"#benefits\\\">무료 혜택\u003C/a>\\n        \u003Ca href=\\\"#howto\\\">참여 방법\u003C/a>\\n        \u003Ca href=\\\"#apply\\\" class=\\\"nav-cta\\\">💛 참여하기\u003C/a>\\n      \u003C/nav>\\n    \u003C/div>\\n  \u003C/header>\\n\\n  \u003C!-- ===== HERO ===== -->\\n  \u003Csection class=\\\"hero\\\" id=\\\"home\\\">\\n    \u003Cdiv class=\\\"hero-content\\\">\\n      \u003Cdiv class=\\\"hero-badge\\\">✨ 완전 무료 · 금전 요구 없음\u003C/div>\\n      \u003Ch1>\\n        매주 \u003Cspan class=\\\"highlight\\\">프리미엄 10조합\u003C/span>\u003Cbr />\\n        로또 번호를 무료로 받으세요\\n      \u003C/h1>\\n      \u003Cp class=\\\"hero-sub\\\">\\n        포엠미디어가 \u003Cstrong>데이터 분석과 다년간의 경험\u003C/strong>을 토대로\u003Cbr />\\n        엄선한 번호 조합을 매주 여러분께 무료로 제공합니다.\\n      \u003C/p>\\n      \u003Cdiv class=\\\"hero-buttons\\\">\\n        \u003Ca href=\\\"https://open.kakao.com/PLACEHOLDER\\\" target=\\\"_blank\\\" rel=\\\"noopener\\\" class=\\\"btn-kakao\\\">\\n          \u003Ci class=\\\"fa-regular fa-comment-dots\\\">\u003C/i>\\n          카카오톡 친구추가 후 [참여]\\n        \u003C/a>\\n        \u003Ca href=\\\"#apply\\\" class=\\\"btn-form\\\">\\n          \u003Ci class=\\\"fa-solid fa-file-pen\\\">\u003C/i>\\n          신청서 작성하기\\n        \u003C/a>\\n      \u003C/div>\\n      \u003Cdiv class=\\\"hero-balls\\\">\\n        \u003Cdiv class=\\\"ball\\\">7\u003C/div>\\n        \u003Cdiv class=\\\"ball\\\">14\u003C/div>\\n        \u003Cdiv class=\\\"ball\\\">23\u003C/div>\\n        \u003Cdiv class=\\\"ball\\\">31\u003C/div>\\n        \u003Cdiv class=\\\"ball\\\">38\u003C/div>\\n        \u003Cdiv class=\\\"ball\\\">42\u003C/div>\\n      \u003C/div>\\n    \u003C/div>\\n    \u003Cdiv class=\\\"scroll-down\\\">\\n      \u003Ci class=\\\"fa-solid fa-chevron-down\\\">\u003C/i>\\n      \u003Cspan>스크롤\u003C/span>\\n    \u003C/div>\\n  \u003C/section>\\n\\n  \u003C!-- ===== ABOUT ===== -->\\n  \u003Csection id=\\\"about\\\">\\n    \u003Cdiv class=\\\"section-inner\\\">\\n      \u003Cdiv class=\\\"about-grid\\\">\\n        \u003Cdiv class=\\\"about-text reveal\\\">\\n          \u003Cspan class=\\\"section-tag\\\">About 포엠미디어\u003C/span>\\n          \u003Ch2 class=\\\"section-title\\\">데이터가 만들어내는\u003Cbr />\u003Cspan style=\\\"color:var(--gold-bright)\\\">특별한 번호 조합\u003C/span>\u003C/h2>\\n          \u003Cdiv class=\\\"divider\\\">\u003C/div>\\n          \u003Cp class=\\\"section-desc\\\" style=\\\"margin-bottom:20px;\\\">\\n            포엠미디어는 수년간의 로또 데이터를 수집·분석하여 패턴을 연구합니다.\\n            단순한 감이 아닌, \u003Cstrong style=\\\"color:var(--gold-light)\\\">체계적인 데이터 분석\u003C/strong>을 통해\\n            매주 10가지 프리미엄 번호 조합을 선별합니다.\\n          \u003C/p>\\n          \u003Cp class=\\\"section-desc\\\">\\n            저희의 목적은 \u003Cstrong style=\\\"color:var(--gold-light)\\\">순수한 데이터 수집\u003C/strong>입니다.\\n            참여자 여러분께는 번호 조합과 다양한 기프티콘 혜택을 무료로 드리며,\\n            어떠한 금전적 요구도 하지 않습니다.\\n          \u003C/p>\\n          \u003Cdiv class=\\\"about-stat-row\\\" style=\\\"margin-top:32px;\\\">\\n            \u003Cdiv class=\\\"about-stat\\\">\\n              \u003Cspan class=\\\"num\\\">10\u003C/span>\\n              \u003Cdiv class=\\\"label\\\">매주 제공\u003Cbr />번호 조합\u003C/div>\\n            \u003C/div>\\n            \u003Cdiv class=\\\"about-stat\\\">\\n              \u003Cspan class=\\\"num\\\">0원\u003C/span>\\n              \u003Cdiv class=\\\"label\\\">참여 비용\u003Cbr />완전 무료\u003C/div>\\n            \u003C/div>\\n            \u003Cdiv class=\\\"about-stat\\\">\\n              \u003Cspan class=\\\"num\\\">100%\u003C/span>\\n              \u003Cdiv class=\\\"label\\\">금전 요구\u003Cbr />없음\u003C/div>\\n            \u003C/div>\\n          \u003C/div>\\n        \u003C/div>\\n\\n        \u003Cdiv class=\\\"about-visual reveal\\\">\\n          \u003Cdiv class=\\\"lottery-card\\\">\\n            \u003Cdiv class=\\\"lottery-card-title\\\">🏆 이번 주 프리미엄 10조합 미리보기\u003C/div>\\n            \u003Cdiv class=\\\"card-badge\\\">PREMIUM\u003C/div>\\n            \u003Cdiv class=\\\"combo-row\\\">\\n              \u003Cspan class=\\\"combo-label\\\">1조\u003C/span>\\n              \u003Cdiv class=\\\"combo-balls\\\">\\n                \u003Cdiv class=\\\"mini-ball b1\\\">3\u003C/div>\\n                \u003Cdiv class=\\\"mini-ball b2\\\">11\u003C/div>  \u003Cdiv class=\\\"benefit-icon\\\">📊\u003C/div>\\n          \u003Cdiv class=\\\"benefit-title\\\">데이터 분석 인사이트\u003C/div>\\n          \u003Cp class=\\\"benefit-desc\\\">\\n            번호 조합과 함께 분석 근거, 최근 당첨 통계 등\\n            유용한 데이터 인사이트도 함께 공유합니다.\\n          \u003C/p>\\n          \u003Cspan class=\\\"benefit-tag\\\">정보 제공\u003C/span>\\n        \u003C/div>\\n        \u003Cdiv class=\\\"benefit-card reveal\\\">\\n          \u003Cdiv class=\\\"benefit-icon\\\">🔒\u003C/div>\\n          \u003Cdiv class=\\\"benefit-title\\\">완전 무료 · 안전 보장\u003C/div>\\n          \u003Cp class=\\\"benefit-desc\\\">\\n            어떠한 금전적 요구도 없습니다. 순수 데이터 수집 목적으로\\n            운영되며 개인정보는 안전하게 보호됩니다.\\n          \u003C/p>\\n          \u003Cspan class=\\\"benefit-tag\\\">금전 요구 없음\u003C/span>\\n        \u003C/div>\\n      \u003C/div>\\n    \u003C/div>\\n  \u003C/section>\\n\\n  \u003C!-- ===== TRUST ===== -->\\n  \u003Csection id=\\\"trust\\\">\\n    \u003Cdiv class=\\\"section-inner\\\">\\n      \u003Cdiv class=\\\"trust-header reveal\\\">\\n        \u003Cspan class=\\\"section-tag\\\">Why 포엠미디어\u003C/span>\\n        \u003Ch2 class=\\\"section-title\\\">왜 포엠미디어를 선택해야 할까요?\u003C/h2>\\n        \u003Cdiv class=\\\"divider\\\">\u003C/div>\\n        \u003Cp class=\\\"section-desc\\\">\\n          수많은 서비스 중 포엠미디어를 선택해야 하는 이유, 직접 확인해보세요.\\n        \u003C/p>\\n      \u003C/div>\\n      \u003Cdiv class=\\\"trust-grid\\\">\\n        \u003Cdiv class=\\\"trust-item reveal\\\">\\n          \u003Cdiv class=\\\"trust-icon\\\">📈\u003C/div>\\n          \u003Cdiv class=\\\"trust-title\\\">체계적 데이터 분석\u003C/div>\\n          \u003Cp class=\\\"trust-desc\\\">수년간 누적된 로또 당첨 데이터와 통계를 기반으로 패턴을 분석합니다.\u003C/p>\\n        \u003C/div>\\n        \u003Cdiv class=\\\"trust-item reveal\\\">\\n          \u003Cdiv class=\\\"trust-icon\\\">💰\u003C/div>\\n          \u003Cdiv class=\\\"trust-title\\\">완전 무료\u003C/div>\\n          \u003Cp class=\\\"trust-desc\\\">참여비, 가입비, 정보이용료 등 어떤 명목으로도 금전을 요구하지 않습니다.\u003C/p>\\n        \u003C/div>\\n        \u003Cdiv class=\\\"trust-item reveal\\\">\\n          \u003Cdiv class=\\\"trust-icon\\\">🗓️\u003C/div>\\n          \u003Cdiv class=\\\"trust-title\\\">매주 정기 발행\u003C/div>\\n          \u003Cp class=\\\"trust-desc\\\">매주 빠짐없이 프리미엄 10조합 번호를 정기적으로 발행·공유합니다.\u003C/p>\\n        \u003C/div>\\n        \u003Cdiv class=\\\"trust-item reveal\\\">\\n          \u003Cdiv class=\\\"trust-icon\\\">🛡️\u003C/div>\\n          \u003Cdiv class=\\\"trust-title\\\">개인정보 보호\u003C/div>\\n          \u003Cp class=\\\"trust-desc\\\">수집된 정보는 데이터 연구 목적으로만 사용되며 외부에 제공하지 않습니다.\u003C/p>\\n        \u003C/div>\\n        \u003Cdiv class=\\\"trust-item reveal\\\">\\n          \u003Cdiv class=\\\"trust-icon\\\">🤝\u003C/div>\\n          \u003Cdiv class=\\\"trust-title\\\">신뢰할 수 있는 운영\u003C/div>\\n          \u003Cp class=\\\"trust-desc\\\">투명한 운영 원칙과 정직한 서비스로 참여자 여러분의 신뢰를 최우선으로 합니다.\u003C/p>\\n        \u003C/div>\\n        \u003Cdiv class=\\\"trust-item reveal\\\">\\n          \u003Cdiv class=\\\"trust-icon\\\">🎁\u003C/div>\\n          \u003Cdiv class=\\\"trust-title\\\">추가 혜택 제공\u003C/div>\\n          \u003Cp class=\\\"trust-desc\\\">번호 조합 외에도 각종 기프티콘 이벤트를 통해 참여의 즐거움을 더합니다.\u003C/p>\\n        \u003C/div>\\n      \u003C/div>\\n    \u003C/div>\\n  \u003C/section>\\n\\n  \u003C!-- ===== HOW TO ===== -->\\n  \u003Csection id=\\\"howto\\\">\\n    \u003Cdiv class=\\\"section-inner\\\">\\n      \u003Cdiv class=\\\"howto-header reveal\\\">\\n        \u003Cspan class=\\\"section-tag\\\">How To Join\u003C/span>\\n        \u003Ch2 class=\\\"section-title\\\">딱 3단계로 참여 완료!\u003C/h2>\\n        \u003Cdiv class=\\\"divider\\\">\u003C/div>\\n        \u003Cp class=\\\"section-desc\\\">복잡한 절차 없이 간단하게 참여하실 수 있습니다.\u003C/p>\\n      \u003C/div>\\n      \u003Cdiv class=\\\"steps\\\">\\n        \u003Cdiv class=\\\"step reveal\\\">\\n          \u003Cdiv class=\\\"step-num\\\">1\u003C/div>\\n          \u003Cdiv class=\\\"step-connector\\\">\u003C/div>\\n          \u003Cdiv class=\\\"step-title\\\">카카오톡 친구추가\u00 class=\\\"divider\\\" style=\\\"margin-left:auto;margin-right:auto;\\\">\u003C/div>\\n          \u003Cp class=\\\"section-desc\\\" style=\\\"text-align:center; margin-bottom:40px;\\\">\\n            카카오톡 친구추가 또는 구글폼 신청서로 간편하게 참여하실 수 있습니다.\\n          \u003C/p>\\n        \u003C/div>\\n        \u003Cdiv class=\\\"form-card reveal\\\">\\n          \u003Cdiv class=\\\"notice-box\\\">\\n            \u003Ci class=\\\"fa-solid fa-shield-halved\\\">\u003C/i>\\n            \u003Cspan>포엠미디어는 \u003Cstrong>어떠한 금전적 요구도 하지 않습니다.\u003C/strong> 순수하게 데이터 수집과 참여자 혜택 제공을 목적으로 운영됩니다.\u003C/span>\\n          \u003C/div>\\n          \u003Cdiv class=\\\"form-buttons\\\">\\n            \u003Ca href=\\\"https://open.kakao.com/PLACEHOLDER\\\" target=\\\"_blank\\\" rel=\\\"noopener\\\" class=\\\"btn-apply-kakao\\\">\\n              \u003Ci class=\\\"fa-regular fa-comment-dots\\\" style=\\\"font-size:22px;\\\">\u003C/i>\\n              카카오톡 친구추가 후 [참여] 메시지 보내기\\n            \u003C/a>\\n            \u003Ca href=\\\"https://docs.google.com/forms/PLACEHOLDER\\\" target=\\\"_blank\\\" rel=\\\"noopener\\\" class=\\\"btn-apply-form\\\">\\n              \u003Ci class=\\\"fa-solid fa-file-pen\\\" style=\\\"font-size:20px;\\\">\u003C/i>\\n              구글폼 참여 신청서 작성하기\\n            \u003C/a>\\n          \u003C/div>\\n          \u003Cp class=\\\"form-note\\\">\\n            📌 카카오톡 친구추가 후 채팅창에 \u003Cstrong style=\\\"color:var(--gold-light);\\\">[참여]\u003C/strong>라고 입력해 주시면 담당자가 안내드립니다.\u003Cbr />\\n            📌 구글폼 작성 후에도 카카오톡으로 안내 메시지를 드립니다.\u003Cbr />\\n            📌 개인정보는 데이터 수집 목적으로만 사용되며 외부에 절대 제공되지 않습니다.\\n          \u003C/p>\\n        \u003C/div>\\n      \u003C/div>\\n    \u003C/div>\\n  \u003C/section>\\n\\n  \u003C!-- ===== FOOTER ===== -->\\n  \u003Cfooter>\\n    \u003Cdiv class=\\\"footer-logo\\\">포엠미디어\u003C/div>\\n    \u003Cp class=\\\"footer-tagline\\\">데이터 분석으로 만드는 매주 프리미엄 10조합 · 완전 무료 서비스\u003C/p>\\n    \u003Cdiv class=\\\"footer-links\\\">\\n      \u003Ca href=\\\"#about\\\">서비스 소개\u003C/a>\\n      \u003Ca href=\\\"#benefits\\\">무료 혜택\u003C/a>\\n      \u003Ca href=\\\"#trust\\\">신뢰 포인트\u003C/a>\\n      \u003Ca href=\\\"#howto\\\">참여 방법\u003C/a>\\n      \u003Ca href=\\\"#apply\\\">신청하기\u003C/a>\\n    \u003C/div>\\n    \u003Cp class=\\\"footer-copy\\\">\\n      © 2025 포엠미디어. All Rights Reserved.\\n    \u003C/p>\\n    \u003Cp class=\\\"footer-disclaimer\\\">\\n      본 서비스는 순수 데이터 수집 목적으로 운영되며, 로또 당첨을 보장하지 않습니다.\u003Cbr />\\n      어떠한 금전적 요구도 없으며, 참여는 자유 의지에 의해 이루어집니다.\\n    \u003C/p>\\n  \u003C/footer>\\n\\n  \u003C!-- ===== FLOATING BUTTON ===== -->\\n  \u003Ca href=\\\"https://open.kakao.com/PLACEHOLDER\\\" target=\\\"_blank\\\" rel=\\\"noopener\\\" class=\\\"float-btn\\\">\\n    \u003Ci class=\\\"fa-regular fa-comment-dots\\\">\u003C/i>\\n    카카오 친구추가\\n  \u003C/a>\\n\\n  \u003C!-- ===== SCRIPTS ===== -->\\n  \u003Cscript>\\n    // Intersection Observer for scroll reveal\\n    const revealEls = document.querySelectorAll('.reveal');\\n    const observer = new IntersectionObserver((entries) => {\\n      entries.forEach((entry, i) => {\\n        if (entry.isIntersecting) {\\n          setTimeout(() => {\\n            entry.target.classList.add('visible');\\n          }, i * 80);\\n          observer.unobserve(entry.target);\\n        }\\n      });\\n    }, { threshold: 0.12 });\\n    revealEls.forEach(el => observer.observe(el));\\n\\n    // Header scroll effect\\n    const header = document.querySelector('header');\\n    window.addEventListener('scroll', () => {\\n      if (window.scrollY > 60) {\\n        header.style.background = 'rgba(10,22,40,0.98)';\\n        header.style.boxShadow = '0 4px 24px rgba(0,0,0,0.3)';\\n      } else {\\n        header.style.background = 'rgba(10,22,40,0.92)';\\n        header.style.boxShadow = 'none';\\n      }\\n    });\\n\\n    // Smooth counter animation for stats\\n    function animateCounter(el, target, suffix = '') {\\n      let start = 0;\\n      const duration = 1800;\\n      const step = (timestamp) => {\\n        if (!start) start = timestamp;\\n        const progress = Math.min((timestamp - start) / duration, 1);\\n        const ease = 1 - Math.pow(1 - progress, 3);\\n        const current = Math.floor(ease * target);\\n        el.textContent = current + suffix;\\n        if (progress \u003C 1) requestAnimationFrame(step);\\n      };\\n      requestAnimationFrame(step);\\n    }\\n\\n    // Observe stat numbers\\n    const statObserver = new IntersectionObserver((entries) => {\\n      entries.forEach(entry => {\\n        if (entry.isIntersecting) {\\n          const nums = entry.target.querySelectorAll('.about-stat .num');\\n          nums.forEach(num => {\\n            const text = num.textContent;\\n            if (text === '10') animateCounter(num, 10, '');\\n            else if (text === '0원') {\\n              // static\\n            } else if (text === '100%') {\\n              animateCounter(num, 100, '%');\\n            }\\n          });\\n          statObserver.unobserve(entry.target);\\n        }\\n      });\\n    }, { threshold: 0.5 });\\n\\n    const statsSection = document.querySelector('.about-stat-row');\\n    if (statsSection) statObserver.observe(statsSection);\\n\\n    // Lotto ball hover sparkle effect\\n    document.querySelectorAll('.ball').forEach(ball => {\\n      ball.addEventListener('mouseenter', () => {\\n        ball.style.transform = 'scale(1.2) rotate(-5deg)';\\n        ball.style.transition = 'transform 0.2s cubic-bezier(0.34,1.56,0.64,1)';\\n      });\\n      ball.addEventListener('mouseleave', () => {\\n        ball.style.transform = 'scale(1) rotate(0deg)';\\n      });\\n    });\\n  \u003C/script>\\n\u003C/body>\\n\u003C/html>\\n\"}",{"id":205,"role":54,"content":210,"action":17,"recommend_actions":17,"is_prompt":22,"render_template":17,"session_state":211,"system_reminder":17,"message_type":17,"tool_calls":17,"tool_call_id":205,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"  브랜드명, 태그라인, 내비게이션, 저작권, 면책 조항 |\\n| **플로팅 버튼** | 우측 하단 고정 카카오 친구추가 버튼 |\\n| **스크롤 애니메이션** | Intersection Observer 기반 요소 등장 효과 |\\n| **헤더** | 스크롤 시 배경 강화, 상단 고정 네비게이션 |\\n\\n---\\n\\n## 진입점 URI\\n\\n| 경로 | 설명 |\\n|------|------|\\n| `/` 또는 `/index.html` | 메인 홍보 페이지 |\\n| `#about` | 서비스 소개 섹션 |\\n| `#benefits` | 무료 혜택 섹션 |\\n| `#trust` | 신뢰 포인트 섹션 |\\n| `#howto` | 참여 방법 섹션 |\\n| `#apply` | 신청하기 섹션 |\\n\\n---\\n\\n## 플레이스홀더 교체 필요\\n\\n아래 URL을 실제 주소로 교체해 주세요:\\n\\n| 위치 | 현재 값 | 교체할 내용 |\\n|------|---------|------------|\\n| 히어로 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 채널 또는 오픈채팅 링크 |\\n| 참여방법 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 링크 |\\n| 신청 섹션 카카오 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 링크 |\\n| 신청 섹션 구글폼 버튼 | `https://docs.google.com/forms/PLACEHOLDER` | 실제 구글폼 URL |\\n| 플로팅 버튼 | `https://open.kakao.com/PLACEHOLDER` | 실제 카카오톡 링크 |\\n\\n---\\n\\n## 디자인 특징\\n\\n- **색상**: 진한 네이비(#0a1628) + 골드(#d4a017, #ffd700) 프리미엄 조합\\n- **폰트**: Noto Sans KR (Google Fonts CDN)\\n- **아이콘**: Font Awesome 6.4.0 (jsDelivr CDN)\\n- **반응형**: 모바일·태블릿·데스크탑 최적화\\n- **애니메이션**: 스크롤 등장 효과, 번호볼 팝 효과, 배경 오브 부유 효과\\n- **타겟 폰트 크기**: 최소 15px, 본문 17px (40~60대 가독성 최적화)\\n\\n---\\n\\n## 파일 구조\\n\\n```\\nindex.html    ← 단일 HTML 파일 (CSS·JS 모두 포함)\\nREADME.md     ← 프로젝트 문서\\n```\\n\\n---\\n\\n## 미구현 사항 / 추천 다음 단계\\n\\n1. **실제 카카오톡 링크** 연결 (채널 또는 오픈채팅 URL)\\n2. **실제 구글폼 URL** 연결\\n3. **참여자 후기/리뷰 섹션** 추가\\n4. **과거 번호 조합 아카이브** 섹션 추가\\n5. **당첨 사례** 섹션 (데이터 수집 후 추가)\\n6. **FAQ 섹션** 추가 (자주 묻는 질문)\\n7. **구글 애널리틱스** 연동 (참여자 데이터 수집 강화)\\n\\n---\\n\\n## 배포 방법\\n\\n**Publish 탭**에서 원클릭 배포 가능합니다.  \\n배포 후 제공되는 URL을 카카오톡 프로필 링크 또는 홍보 채널에 공유하세요.\\n\", \"file_path\": \"README.md\"}",{"id":256,"role":54,"content":260,"action":17,"recommend_actions":17,"is_prompt":22,"render_template":17,"session_state":261,"system_reminder":17,"message_type":17,"tool_calls":17,"tool_call_id":256,"project_id":17,"thinking_blocks":17,"response_id":17,"reasoning_id":17,"reasoning_encrypted_content":17,"reas olute;\n      bottom: 36px;\n      left: 50%;\n      transform: translateX(-50%);\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 8px;\n      color: rgba(200,212,232,0.5);\n      font-size: 12px;\n      font-weight: 500;\n      animation: fadeInUp 1s ease 2s both;\n    }\n\n    .scroll-hint .scroll-arrow {\n      width: 22px; height: 22px;\n      border-right: 2px solid rgba(200,212,232,0.4);\n      border-bottom: 2px solid rgba(200,212,232,0.4);\n      transform: rotate(45deg);\n      animation: scrollDown 1.6s ease-in-out infinite;\n    }\n\n    @keyframes scrollDown {\n      0% { opacity: 0; transform: rotate(45deg) translateY(-6px); }\n      50% { opacity: 1; }\n      100% { opacity: 0; transform: rotate(45deg) translateY(6px); }\n    }\n\n    /* ===== 통계 바 ===== */\n    .stats-bar {\n      background: linear-gradient(90deg, var(--navy-mid), var(--navy-light));\n      border-top: 1px solid rgba(245,197,24,0.18);\n      border-bottom: 1px solid rgba(245,197,24,0.18);\n      padding: 36px 24px;\n    }\n\n    .stats-inner {\n      max-width: 1100px;\n      margin: 0 auto;\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 20px;\n    }\n\n    .stat-item {\n      text-align: center;\n      padding: 16px;\n    }\n\n    .stat-num {\n      font-size: 36px;\n      font-weight: 900;\n      color: var(--gold-bright);\n      line-height: 1;\n      margin-bottom: 8px;\n    }\n\n    .stat-label {\n      font-size: 14px;\n      color: var(--gray-text);\n      font-weight: 500;\n      line-height: 1.4;\n    }\n\n    /* ===== 공통 섹션 스타일 ===== */\n    section { padding: 100px 24px; }\n\n    .section-inner { max-width: 1100px; margin: 0 auto; }\n\n    .section-label {\n      display: inline-block;\n      font-size: 13px;\n      font-weight: 700;\n      letter-spacing: 2px;\n      text-transform: uppercase;\n      color: var(--gold-bright);\n      margin-bottom: 14px;\n    }\n\n    .section-title {\n      font -weight: 600;\n      padding: 8px 16px;\n      border-radius: 50px;\n    }\n\n    /* ===== 무료 혜택 섹션 ===== */\n    .benefits-section {\n      background: var(--navy-mid);\n    }\n\n    .benefits-grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n      gap: 24px;\n    }\n\n    .benefit-card {\n      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));\n      border: 1px solid rgba(245,197,24,0.15);\n      border-radius: var(--radius-lg);\n      padding: 36px 28px;\n      text-align: center;\n      transition: var(--transition);\n      position: relative;\n      overflow: hidden;\n    }\n\n    .benefit-card:hover {\n      transform: translateY(-8px);\n      border-color: rgba(245,197,24,0.4);\n      box-shadow: var(--shadow-gold), var(--shadow-navy);\n    }\n\n    .benefit-card.featured {\n      background: linear-gradient(160deg, rgba(245,197,24,0.1), rgba(245,197,24,0.03));\n      border-color: rgba(245,197,24,0.35);\n    }\n\n    .benefit-card.featured::after {\n      content: '🏆 주요혜택';\n      position: absolute;\n      top: 16px; right: -28px;\n      background: linear-gradient(135deg, var(--gold-bright), var(--gold-mid));\n      color: var(--navy-deep);\n      font-size: 11px;\n      font-weight: 800;\n      padding: 5px 36px;\n      transform: rotate(35deg);\n      white-space: nowrap;\n      letter-spacing: 0.5px;\n    }\n\n    .benefit-icon {\n      width: 72px; height: 72px;\n      margin: 0 auto 22px;\n      background: linear-gradient(135deg, rgba(245,197,24,0.2), rgba(245,197,24,0.05));\n      border: 2px solid rgba(245,197,24,0.3);\n      border-radius: 20px;\n      display: flex; align-items: center; justify-content: center;\n      font-size: 32px;\n    }\n\n    .benefit-title {\n      font-size: 20px;\n      font-weight: 800;\n      margin-bottom: 12px;\n      color: var(--white);\n    }\n\n    .benefit-desc {\n      font-size: 15px;\n      color: var(--gray-text);\n      line x;\n      font-weight: 800;\n      letter-spacing: 0.3px;\n    }\n\n    /* 플로팅 펄스 */\n    .floating-kakao::before {\n      content: '';\n      position: absolute;\n      inset: -4px;\n      border-radius: 50%;\n      border: 2px solid rgba(254,229,0,0.5);\n      animation: pulse-ring 2s ease-out infinite;\n    }\n\n    @keyframes pulse-ring {\n      0% { transform: scale(1); opacity: 1; }\n      100% { transform: scale(1.6); opacity: 0; }\n    }\n\n    /* ===== 스크롤 애니메이션 ===== */\n    .reveal {\n      opacity: 0;\n      transform: translateY(36px);\n      transition: opacity 0.7s ease, transform 0.7s ease;\n    }\n\n    .reveal.visible {\n      opacity: 1;\n      transform: translateY(0);\n    }\n\n    .reveal-delay-1 { transition-delay: 0.1s; }\n    .reveal-delay-2 { transition-delay: 0.2s; }\n    .reveal-delay-3 { transition-delay: 0.3s; }\n    .reveal-delay-4 { transition-delay: 0.4s; }\n\n    /* ===== 반응형 ===== */\n    @media (max-width: 900px) {\n      .stats-inner { grid-template-columns: repeat(2, 1fr); }\n      .intro-grid { grid-template-columns: 1fr; gap: 40px; }\n      .trust-grid { grid-template-columns: repeat(2, 1fr); }\n      .steps-wrapper { grid-template-columns: 1fr; }\n      .steps-wrapper::before { display: none; }\n    }\n\n    @media (max-width: 640px) {\n      section { padding: 72px 20px; }\n      .hero { padding: 100px 20px 60px; }\n      .stats-inner { grid-template-columns: repeat(2, 1fr); gap: 8px; }\n      .stat-num { font-size: 28px; }\n      .trust-grid { grid-template-columns: 1fr; }\n      .benefits-grid { grid-template-columns: 1fr; }\n      .cta-box { padding: 44px 24px; }\n      .lotto-ball { width: 44px; height: 44px; font-size: 15px; }\n      .hero-btns { flex-direction: column; align-items: center; }\n      .btn-kakao, .btn-form { min-width: auto; width: 100%; max-width: 340px; }\n      .intro-grid { grid-template-columns: 1fr; }\n      .footer-links { gap: 16px; }\n    }\n\n    @keyframes fadeInUp {\n      from { opacity: 0; transform: translateY(20px); }\n      to { opacity: 1; transform: translateY(0); }\n    }\n  \u003C/style>\n\u003C/head>\n\u003Cbody>\n\n  \u003C!-- ===== 상단 네비게이션 ===== -->\n  \u003Cnav class=\"navbar\">\n    \u003Cdiv class=\"navbar-logo\">\n      \u003Cdiv class=\"logo-icon\">P\u003C/div>\n      \u003Cdiv class=\"logo-text\">\u003Cspan>포엠\u003C/span>미디어\u003C/div>\n    \u003C/div>\n    \u003Ca href=\"https://vvd.bz/hupb\" target=\"_blank\" class=\"navbar-cta\">\n      💛 카카오톡 친구추가\n    \u003C/a>\n  \u003C/nav>\n\n  \u003C!-- ===== 히어로 섹션 ===== -->\n  \u003Csection class=\"hero\" id=\"home\">\n    \u003Cdiv class=\"hero-inner\">\n      \u003Cdiv class=\"hero-badge\">포엠미디어 공식 서비스\u003C/div>\n\n      \u003Ch1 class=\"hero-title\">\n        매주 \u003Cspan class=\"highlight\">데이터 분석\u003C/span>으로\u003Cbr />\n        선별한 \u003Cspan class=\"highlight\">프리미엄 10조합\u003C/span>\u003Cbr />\n        번호를 무료로 드립니다\n      \u003C/h1>\n\n      \u003Cp class=\"hero-sub\">\n        수년간의 로또 데이터 분석과 통계적 경험을 바탕으로\u003Cbr />\n        매주 엄선된 10가지 번호 조합을 \u003Cstrong>완전 무료\u003C/strong>로 제공합니다.\n      \u003C/p>\n\n      \u003Cdiv class=\"hero-free-label\">🎁 금전적 요구 없음 · 순수 데이터 수집 목적 · 100% 무료\u003C/div>\n\n      \u003C!-- 번호볼 애니메이션 -->\n      \u003Cdiv class=\"lotto-balls-hero\">\n        \u003Cdiv class=\"lotto-ball ball-yellow\">7\u003C/div>\n        \u003Cdiv class=\"lotto-ball ball-blue\">14\u003C/div>\n        \u003Cdiv class=\"lotto-ball ball-red\">23\u003C/div>\n        \u003Cdiv class=\"lotto-ball ball-gray\">31\u003C/div>\n        \u003Cdiv class=\"lotto-ball ball-green\">38\u003C/div>\n        \u003Cdiv class=\"lotto-ball ball-purple\">42\u003C/div>\n      \u003C/div>\n\n      \u003C!-- CTA 버튼 -->\n      \u003Cdiv class=\"hero-btns\">\n        \u003Ca href=\"https://vvd.bz/hupb\" target=\"_blank\" class=\"btn-kakao\">\n          \u003Csvg class=\"kakao-icon\" viewBox=\"0 0 24 24\" fill=\"#3C1E1E\">\n            \u003Cpath d=\"M12 3C6.48 3 2 6.48 2 10.5c0 2.49 1.48 4.69 3.75 6.08L4.5 엄선된 프리미엄 번호 조합 10가지를 완전 무료로 제공하는 서비스입니다.\n            금전적 요구는 일절 없으며, 오로지 데이터 수집과 분석 개선을 위해 운영됩니다.\n          \u003C/p>\n\n          \u003Cdiv class=\"intro-points\">\n            \u003Cdiv class=\"intro-point\">\n              \u003Cdiv class=\"intro-point-icon\">📊\u003C/div>\n              \u003Cdiv class=\"intro-point-text\">\n                \u003Cstrong>데이터 기반 분석\u003C/strong>\n                \u003Cspan>수년간의 로또 데이터를 통계적으로 분석하여 번호 조합을 선별합니다\u003C/span>\n              \u003C/div>\n            \u003C/div>\n            \u003Cdiv class=\"intro-point\">\n              \u003Cdiv class=\"intro-point-icon\">🔄\u003C/div>\n              \u003Cdiv class=\"intro-point-text\">\n                \u003Cstrong>매주 정기 발행\u003C/strong>\n                \u003Cspan>매주 꾸준하게 10가지 프리미엄 번호 조합을 새롭게 제공합니다\u003C/span>\n              \u003C/div>\n            \u003C/div>\n            \u003Cdiv class=\"intro-point\">\n              \u003Cdiv class=\"intro-point-icon\">💯\u003C/div>\n              \u003Cdiv class=\"intro-point-text\">\n                \u003Cstrong>완전 무료 서비스\u003C/strong>\n                \u003Cspan>일체의 비용 없이 무료로 제공됩니다. 금전 요구는 절대 없습니다\u003C/span>\n              \u003C/div>\n            \u003C/div>\n          \u003C/div>\n        \u003C/div>\n\n        \u003C!-- 샘플 번호 카드 -->\n        \u003Cdiv class=\"sample-card reveal reveal-delay-2\">\n          \u003Cdiv class=\"sample-card-title\">이번 주 샘플 번호 미리보기\u003C/div>\n\n          \u003Cdiv class=\"combo-row\">\n            \u003Cspan class=\"combo-num\">1\u003C/span>\n            \u003Cdiv class=\"combo-balls\">\n              \u003Cdiv class=\"ball-sm ball-yellow\" style=\"background:linear-gradient(145deg,#ffd700,#f4a000);color:#fff\">3\u003C/div>\n              \u003Cdiv class=\"ball-sm ball-blue\" style=\"background:linear-gradient(145deg,#4da6ff,#0066cc);color:#fff\">11\u003C/div>\n              \u003Cdiv class=\"ball-sm ball-red\" style=\"background:linear-gradient(145deg,#ff6b6b,#cc2200);color:#fff\">22\u003C/div>\n 콘 등 다양한 혜택을 정기적으로 증정합니다.\n            추가 비용 없이 받으실 수 있습니다.\n          \u003C/div>\n        \u003C/div>\n\n        \u003Cdiv class=\"benefit-card reveal reveal-delay-2\">\n          \u003Cdiv class=\"benefit-icon\">📈\u003C/div>\n          \u003Cdiv class=\"benefit-title\">데이터 인사이트 공유\u003C/div>\n          \u003Cdiv class=\"benefit-desc\">\n            로또 번호 통계 분석 자료와 패턴 인사이트를 참여자분들께 함께 공유합니다.\n            더 스마트한 번호 선택에 도움이 됩니다.\n          \u003C/div>\n        \u003C/div>\n\n        \u003Cdiv class=\"benefit-card reveal reveal-delay-3\">\n          \u003Cdiv class=\"benefit-icon\">🔒\u003C/div>\n          \u003Cdiv class=\"benefit-title\">개인정보 완전 보호\u003C/div>\n          \u003Cdiv class=\"benefit-desc\">\n            수집되는 정보는 오직 서비스 개선과 데이터 분석에만 사용됩니다.\n            제3자 제공 및 상업적 활용은 절대 없습니다.\n          \u003C/div>\n        \u003C/div>\n      \u003C/div>\n    \u003C/div>\n  \u003C/section>\n\n  \u003C!-- ===== 신뢰 포인트 섹션 ===== -->\n  \u003Csection class=\"trust-section\" id=\"trust\">\n    \u003Cdiv class=\"section-inner\">\n      \u003Cdiv class=\"section-header reveal\">\n        \u003Cspan class=\"section-label\">신뢰 포인트\u003C/span>\n        \u003Ch2 class=\"section-title\">왜 포엠미디어인가요?\u003C/h2>\n        \u003Cp class=\"section-desc\">믿고 참여하실 수 있는 이유를 명확하게 설명드립니다.\u003C/p>\n      \u003C/div>\n\n      \u003Cdiv class=\"trust-grid\">\n        \u003Cdiv class=\"trust-card reveal\">\n          \u003Cdiv class=\"trust-icon\">📊\u003C/div>\n          \u003Cdiv class=\"trust-text\">\n            \u003Cstrong>과학적 데이터 분석\u003C/strong>\n            \u003Cspan>수년간 축적된 로또 회차 데이터를 통계학적으로 분석하여 번호 조합을 도출합니다.\u003C/span>\n          \u003C/div>\n        \u003C/div>\n\n        \u003Cdiv class=\"trust-card reveal reveal-delay-1\">\n          \u003Cdiv class=\"trust-icon\">🆓\u003C/div>\n          \u003Cdiv class=\"trust-text\">\n            \u003Cstrong>완전 무료 보장\u003C/strong>\n            \u003Cspan>어떠한 경우에도 금전을 요구하지 않습니다. 현재도, 앞으로도 완전 무료입니다.\u003C/span>\n          \u003C/div>\n        \u00 ment.querySelectorAll('.reveal');\n\n    const revealObserver = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting) {\n          entry.target.classList.add('visible');\n          revealObserver.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });\n\n    revealEls.forEach(el => revealObserver.observe(el));\n\n    // 숫자 카운트업 애니메이션 (통계 바)\n    function animateCount(el, target, suffix = '') {\n      let current = 0;\n      const increment = target / 60;\n      const timer = setInterval(() => {\n        current += increment;\n        if (current >= target) {\n          current = target;\n          clearInterval(timer);\n        }\n        el.textContent = Math.floor(current) + suffix;\n      }, 25);\n    }\n\n    // 통계 바 관찰\n    const statsBar = document.querySelector('.stats-bar');\n    let statsAnimated = false;\n\n    const statsObserver = new IntersectionObserver((entries) => {\n      if (entries[0].isIntersecting && !statsAnimated) {\n        statsAnimated = true;\n      }\n    }, { threshold: 0.4 });\n\n    if (statsBar) statsObserver.observe(statsBar);\n\n    // 네이비 바 스크롤 시 배경 진하게\n    const navbar = document.querySelector('.navbar');\n    window.addEventListener('scroll', () => {\n      if (window.scrollY > 80) {\n        navbar.style.background = 'rgba(10,22,40,0.98)';\n      } else {\n        navbar.style.background = 'rgba(10,22,40,0.92)';\n      }\n    }, { passive: true });\n\n    // 앵커 링크 부드러운 스크롤\n    document.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n      a.addEventListener('click', (e) => {\n        e.preventDefault();\n        const target = document.querySelector(a.getAttribute('href'));\n        if (target) {\n          const offset = 80;\n          window.scrollTo({ top: target.offsetTop - offset, behavior: 'smooth' });\n        }\n      });\n    });\n  \u003C/script>\n\n\u003C/body>\n\u003C/html>\n",{"created_at":362,"updated_a
